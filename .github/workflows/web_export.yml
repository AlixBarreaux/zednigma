name: Web Export

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  export:
    name: Godot Web Export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Export Web
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          relative_export_path: ./dist/web
          archive_export_output: true
          cache: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zednigma-web
          path: ./dist/web
